name: Build QMK Firmware

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: ghcr.io/qmk/qmk_cli

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup QMK
        run: qmk setup -y -H /tmp/qmk_firmware

      - name: Copy keyboard files
        run: cp -r keyboards/joystick /tmp/qmk_firmware/keyboards/joystick

      - name: Build firmware
        run: cd /tmp/qmk_firmware && qmk compile -kb joystick -km default

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: joystick_firmware
          path: /tmp/qmk_firmware/*.uf2
